<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: Honorarium details -->
		<div class="form-group honorarium_Activities-honorarium_details" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Honorarium details</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(honorarium_details)%%></div>
			</div>
		</div>
		<!-- Field: Date -->
		<div class="form-group honorarium_Activities-date" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Date</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%COMBOTEXT(date)%%></div>
			</div>
		</div>
		<!-- Field: No. of hours -->
		<div class="form-group honorarium_Activities-no_of_hours" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">No. of hours</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(no_of_hours)%%></div>
			</div>
		</div>
		<!-- Field: Case Reference Email Subject (If Any) -->
		<div class="form-group honorarium_Activities-case_reference_email_subject" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Case Reference Email Subject (If Any)</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(case_reference_email_subject)%%></div>
			</div>
		</div>
		<!-- Field: Activities/Deliverables -->
		<div class="form-group honorarium_Activities-activities" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Activities/Deliverables</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(activities)%%></div>
			</div>
		</div>
		<!-- Field: Created by Username -->
		<div class="form-group honorarium_Activities-created_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Created by Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(created_by_username)%%></div>
			</div>
		</div>
		<!-- Field: Last Updated By Username -->
		<div class="form-group honorarium_Activities-last_updated_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Last Updated By Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(last_updated_by_username)%%></div>
			</div>
		</div>
		<!-- Field: Approved At -->
		<div class="form-group honorarium_Activities-last_updated_at" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Approved At</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(last_updated_at)%%></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
