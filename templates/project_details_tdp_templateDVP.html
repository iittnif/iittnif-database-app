<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: Project number -->
		<div class="form-group project_details_tdp-project_number" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Project number</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="project_number<%%RND1%%>"><%%COMBOTEXT(project_number)%%></span></div>
			</div>
		</div>
		<!-- Field: Stage 1st (12 Months) -->
		<div class="form-group project_details_tdp-stage_1" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Stage 1st (12 Months)</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(stage_1)%%></div>
			</div>
		</div>
		<!-- Field: Stage 2nd (12 Months) -->
		<div class="form-group project_details_tdp-stage_2" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Stage 2nd (12 Months)</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(stage_2)%%></div>
			</div>
		</div>
		<!-- Field: Stage 3rd (12 Months) -->
		<div class="form-group project_details_tdp-stage_3" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Stage 3rd (12 Months)</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(stage_3)%%></div>
			</div>
		</div>
		<!-- Field: Stage 4th (12 Months) -->
		<div class="form-group project_details_tdp-stage_4" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Stage 4th (12 Months)</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(stage_4)%%></div>
			</div>
		</div>
		<!-- Field: Total in Rs. -->
		<div class="form-group project_details_tdp-total" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Total in Rs.</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(total)%%></div>
			</div>
		</div>
		<!-- Field: Details -->
		<div class="form-group project_details_tdp-details" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Details</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(details)%%></div>
			</div>
		</div>
		<!-- Field: Created By Username -->
		<div class="form-group project_details_tdp-created_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Created By Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(created_by_username)%%></div>
			</div>
		</div>
		<!-- Field: Last Updated by Username -->
		<div class="form-group project_details_tdp-last_updated_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Last Updated by Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(last_updated_by_username)%%></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
