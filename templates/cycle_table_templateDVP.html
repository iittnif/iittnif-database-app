<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: Registration number -->
		<div class="form-group cycle_table-registration_number" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Registration number</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(registration_number)%%></div>
			</div>
		</div>
		<!-- Field: Cycle model -->
		<div class="form-group cycle_table-cycle_model" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Cycle model</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(cycle_model)%%></div>
			</div>
		</div>
		<!-- Field: Cycle color -->
		<div class="form-group cycle_table-cycle_color" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Cycle color</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(cycle_color)%%></div>
			</div>
		</div>
		<!-- Field: Responsible Contact Person -->
		<div class="form-group cycle_table-responsible_contact_person" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Responsible Contact Person</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="responsible_contact_person<%%RND1%%>"><%%COMBOTEXT(responsible_contact_person)%%></span></div>
			</div>
		</div>
		<!-- Field: Contact number of person -->
		<div class="form-group cycle_table-contact_number_of_person" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Contact number of person</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(contact_number_of_person)%%></div>
			</div>
		</div>
		<!-- Field: Purpose -->
		<div class="form-group cycle_table-purpose" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Purpose</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(purpose)%%></div>
			</div>
		</div>
		<!-- Field: Created By Username -->
		<div class="form-group cycle_table-created_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Created By Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(created_by_username)%%></div>
			</div>
		</div>
		<!-- Field: Last Updated by Username -->
		<div class="form-group cycle_table-last_updated_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Last Updated by Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(last_updated_by_username)%%></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
<!-- child records -->
<div class="panel-body">
	<div id="cycle_table-children"></div>
</div>

<script>
	$j(function() {
		/* prevent loading child records in multiple DVP */
		if($j('[id=cycle_table-children]').length > 1) return;

		post(
			'parent-children.php', {
				ParentTable: 'cycle_table',
				SelectedID: '<%%VALUE(id)%%>',
				Operation: 'show-children-printable'
			},
			'cycle_table-children',
			'disable-element',
			'loading-element',
			apply_persisting_children
		);

		$j('form').on('click', '#children-tabs button[data-target]', function() {
			$j(this).toggleClass('active');
			persist_expanded_child($j(this).attr('id'));
		});
	})
</script>
