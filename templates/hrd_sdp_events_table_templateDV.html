<!-- To change the layout of the detail view form, we recommend using JS code in hooks/hrd_sdp_events_table-dv.js rather than editing this file -->

<div id="detail-view"></div>
<div class="panel-heading"><h3 class="panel-title"><strong><%%DETAIL_VIEW_TITLE%%></strong></h3></div>

<div id="hrd_sdp_events_table_dv_container-loading" class="text-center text-info text-bold vspacer-lg"><i class="glyphicon glyphicon-refresh loop-rotate"></i> <%%TRANSLATION(Loading ...)%%></div>

<div class="panel-body hidden" id="hrd_sdp_events_table_dv_container">
	<!-- child links -->
	<div class="row vspacer-md">
		<div class="col-xs-12 children-links">
			<div class="clearfix"></div>
		</div>
	</div>
	<hr class="hidden-xs hidden-sm">

	<div class="row">
		<!-- form inputs -->
		<div class="col-md-8 col-lg-10" id="hrd_sdp_events_table_dv_form">
			<fieldset class="form-horizontal">

				<!-- Field: Year -->
				<div class="form-group hrd_sdp_events_table-year">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="year">Year</label>
					<div class="col-lg-9">
						<input maxlength="255" type="text" class="form-control" name="year" id="year" value="<%%VALUE(year)%%>">
					</div>
				</div>

				<!-- Field: Program name -->
				<div class="form-group hrd_sdp_events_table-program_name">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="program_name">Program name</label>
					<div class="col-lg-9">
						<input maxlength="255" type="text" class="form-control" name="program_name" id="program_name" value="<%%VALUE(program_name)%%>">
					</div>
				</div>

				<!-- Field: Topic/Area of Workshop -->
				<div class="form-group hrd_sdp_events_table-area_of_workshop">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="area_of_workshop">Topic/Area of Workshop</label>
					<div class="col-lg-9">
						<textarea maxlength="65500" class="form-control" name="area_of_workshop" id="area_of_workshop" rows=" 5"><%%VALUE(area_of_workshop)%%></textarea>
					</div>
				</div>

				<!-- Field: Host name -->
				<div class="form-group hrd_sdp_events_table-host_name">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="host_name">Host name</label>
					<div class="col-lg-9">
						<input maxlength="255" type="text" class="form-control" name="host_name" id="host_name" value="<%%VALUE(host_name)%%>">
					</div>
				</div>

				<!-- Field: Location -->
				<div class="form-group hrd_sdp_events_table-location">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="location">Location</label>
					<div class="col-lg-9">
						<input maxlength="255" type="text" class="form-control" name="location" id="location" value="<%%VALUE(location)%%>">
					</div>
				</div>

				<!-- Field: Start date -->
				<div class="form-group hrd_sdp_events_table-start_date">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="start_date-dd">Start date</label>
					<div class="col-lg-9">
						<%%COMBO(start_date)%%>
					</div>
				</div>

				<!-- Field: End date -->
				<div class="form-group hrd_sdp_events_table-end_date">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="end_date-dd">End date</label>
					<div class="col-lg-9">
						<%%COMBO(end_date)%%>
					</div>
				</div>

				<!-- Field: Number of participants -->
				<div class="form-group hrd_sdp_events_table-number_of_participants">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="number_of_participants">Number of participants</label>
					<div class="col-lg-9">
						<input maxlength="255" type="text" class="form-control" name="number_of_participants" id="number_of_participants" value="<%%VALUE(number_of_participants)%%>">
					</div>
				</div>

				<!-- Field: More details -->
				<div class="form-group hrd_sdp_events_table-more_details">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3" for="more_details">More details</label>
					<div class="col-lg-9">
						<input maxlength="255" type="text" class="form-control" name="more_details" id="more_details" value="<%%VALUE(more_details)%%>">
					</div>
				</div>

				<!-- Field: Created By Username -->
				<div class="form-group hrd_sdp_events_table-created_by_username">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3">Created By Username</label>
					<div class="col-lg-9">
						<div class="form-control-static" id="created_by_username"><%%VALUE(created_by_username)%%></div>
					</div>
				</div>

				<!-- Field: Last Updated by Username -->
				<div class="form-group hrd_sdp_events_table-last_updated_by_username">
					<hr class="hidden-md hidden-lg">
					<label class="control-label col-lg-3">Last Updated by Username</label>
					<div class="col-lg-9">
						<div class="form-control-static" id="last_updated_by_username"><%%VALUE(last_updated_by_username)%%></div>
					</div>
				</div>

			</fieldset>
		</div>

		<!-- DV action buttons -->
		<hr class="hidden-md hidden-lg">
		<div class="col-md-4 col-lg-2 dv-action-buttons" id="hrd_sdp_events_table_dv_action_buttons">
			<div class="btn-toolbar">
				<div class="btn-group-vertical btn-group-lg" style="width: 100%;">
					<%%UPDATE_BUTTON%%>
				</div><p></p>
				<div class="btn-group-vertical btn-group-lg" style="width: 100%;">
					<%%DESELECT_BUTTON%%>
					<%%DVPRINT_BUTTON%%>
					<%%DELETE_BUTTON%%>
				</div><p></p>
				<div class="btn-group-vertical btn-group-lg" style="width: 100%;">
					<%%INSERT_BUTTON%%>
				</div>
			</div>
		</div>
	</div>


</div><!-- /div class="panel-body" -->
	<script>
		$j(function() {
			var add_new_mode = (!$j('input[name=SelectedID]').val());
			var embedded_mode = ($j('input[name=Embedded]').val() == 1);

			/* auto-close embedded page? */
			var autoclose_mode = ($j('input[name=AutoClose]').val() == 1);
			var record_added_ok = (location.search.split('record-added-ok=').length == 2);
			var record_updated_ok = (location.search.split('record-updated-ok=').length == 2);
			if((record_added_ok || record_updated_ok) && embedded_mode && autoclose_mode) {
				setTimeout(AppGini.closeParentModal, 2000);
			}


			/* enable DV action buttons to float on scrolling down the form */
			enable_dvab_floating();

			$j('#hrd_sdp_events_table_dv_container-loading').addClass('hidden');
			$j('#hrd_sdp_events_table_dv_container').removeClass('hidden');
			if(!$j('.table_view').length || $j('[name=SelectedID]').val().length) AppGini.focusFormElement('hrd_sdp_events_table', 'year');

			$j('a[href="<%%BASE_UPLOAD_PATH%%>"]').click(function() { return false; });


			if(true /* !embedded_mode */) {
				$j('.add_new_parent').click(function() {
					const fieldId = $j(this).prevAll('input:hidden').eq(0).attr('id');
					const pt = $j(this).attr('id').replace(/_add_new$/, '');

					modal_window({
						url: `${pt}_view.php?addNew_x=1&Embedded=1`,
						close: function() {
							$j(`#${fieldId}-container`).select2('focus').select2('focus');

							/* if a new parent was added, select it */
							var new_id = AppGini.localStorage.getItem(`${pt}_last_added_id`);
							if(new_id === null) return;

							AppGini.localStorage.removeItem(`${pt}_last_added_id`);
							AppGini.lookupText({
								id: new_id,
								table: AppGini.currentTableName(),
								field: fieldId,
								callback: function(data) {
									$j(`#${fieldId}-container`).select2('data', data, true);
								}
							});
						},
						beforeClose: AppGini.confirmBeforeClosingModal,
						size: 'full',
						title: $j(this).attr('title')
					});
				});
			}

			AppGini.hideViewParentLinks();

			$j('form').on('click', '.view_parent', function() {
				const pt = $j(this).attr('id').replace(/_view_parent$/, '');
				const fieldId = $j(this).prevAll('input:hidden').eq(0).attr('id');

				let parent_id = '{empty_value}';
				if(fieldId) {
					parent_id = $j(`#${fieldId}`).val();
				} else if($j(this).prevAll('[type=radio]').length) { /* handle radio lookups */
					parent_id = $j(this).prevAll('[type=radio]').eq(0).val();
				} else {
					parent_id = $j(this).prevAll().children('input:hidden').eq(0).val();
				}

				if(parent_id != '{empty_value}' && parent_id !== undefined && parent_id !== '') {
					const parent_link = $j(this).parents('.form-group').children('label').data('parent_link');
					switch(parent_link) {
						case 'view_parent_hidden':
							break;
						case 'view_parent_modal':
							modal_window({
								url: `${pt}_view.php?Embedded=1&SelectedID=${encodeURIComponent(parent_id)}`,
								close: function() {
									$j(`#${fieldId}-container`).select2('focus').select2('focus');

									// update lookup text in case the parent record was updated
									AppGini.lookupText({
										id: parent_id,
										table: AppGini.currentTableName(),
										field: fieldId,
										cache: false,
										callback: function(data) {
											$j(`#${fieldId}-container`).select2('data', data, true);

											// update auto-fills
											const updaterName = `${fieldId}_update_autofills`;
											if(typeof(window[updaterName]) == 'function')
												window[updaterName]();
										}
									});
								},
								beforeClose: AppGini.confirmBeforeClosingModal,
								size: 'full',
								title: $j(this).attr('title')
							});
							break;
						case 'view_parent_same_window':
							window.location = `${pt}_view.php?Embedded=${embedded_mode ? '1' : ''}&SelectedID=${encodeURIComponent(parent_id)}`;
							break;
						case 'view_parent_new_window':
							window.open(`${pt}_view.php?SelectedID=${encodeURIComponent(parent_id)}`);
							break;
					}

				}
			});

			hrd_sdp_events_tableUniqueFields.forEach(fieldName => enforce_uniqueness('hrd_sdp_events_table', fieldName));

			/* load admin tools for admin user */
			if(!add_new_mode) {
				$j('body').append('<div id="admin-tools-appendix"></div>');
				$j('#admin-tools-appendix').load(
					'ajax_admin_tools.php?table=hrd_sdp_events_table&id=<%%URLVALUE(id)%%>',
					function(resp) {
						if(!resp.length) return;
						$j.ajax('ajax_admin_tools.php?action=get_admin_tools_js&table=hrd_sdp_events_table&id=<%%URLVALUE(id)%%>');
					}
				);
			}
		});

		var hrd_sdp_events_tableUniqueFields = [
		];
	</script>
