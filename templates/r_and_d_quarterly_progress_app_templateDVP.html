<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: R and D Progress Details -->
		<div class="form-group r_and_d_quarterly_progress_app-r_and_d_lookup" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">R and D Progress Details</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="r_and_d_lookup-readonly<%%RND1%%>"><%%COMBOTEXT(r_and_d_lookup)%%></span></div>
			</div>
		</div>
		<!-- Field: Date -->
		<div class="form-group r_and_d_quarterly_progress_app-date" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Date</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%COMBOTEXT(date)%%></div>
			</div>
		</div>
		<!-- Field: Attendees -->
		<div class="form-group r_and_d_quarterly_progress_app-attendees" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Attendees</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(attendees)%%></div>
			</div>
		</div>
		<!-- Field: Minutes -->
		<div class="form-group r_and_d_quarterly_progress_app-minutes" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Minutes</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(minutes)%%></div>
			</div>
		</div>
		<!-- Field: Tech-Mgr Remarks -->
		<div class="form-group r_and_d_quarterly_progress_app-Tech_Mgr_Remarks" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Tech-Mgr Remarks</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(Tech_Mgr_Remarks)%%></div>
			</div>
		</div>
		<!-- Field: Ceo remarks -->
		<div class="form-group r_and_d_quarterly_progress_app-ceo_remarks" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Ceo remarks</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(ceo_remarks)%%></div>
			</div>
		</div>
		<!-- Field: PD's Remarks -->
		<div class="form-group r_and_d_quarterly_progress_app-pd_remarks" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">PD's Remarks</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(pd_remarks)%%></div>
			</div>
		</div>
		<!-- Field: Created By Username -->
		<div class="form-group r_and_d_quarterly_progress_app-created_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Created By Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(created_by_username)%%></div>
			</div>
		</div>
		<!-- Field: Last Updated by Username -->
		<div class="form-group r_and_d_quarterly_progress_app-last_updated_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Last Updated by Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(last_updated_by_username)%%></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
