<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: Task description -->
		<div class="form-group task_allocation_table-task_description" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Task description</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(task_description)%%></div>
			</div>
		</div>
		<!-- Field: Task status -->
		<div class="form-group task_allocation_table-task_status" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Task status</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%COMBOTEXT(task_status)%%></div>
			</div>
		</div>
		<!-- Field: Task Duration (Number of Days) -->
		<div class="form-group task_allocation_table-task_duration" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Task Duration (Number of Days)</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(task_duration)%%></div>
			</div>
		</div>
		<!-- Field: Task Assigned Date -->
		<div class="form-group task_allocation_table-task_set_date" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Task Assigned Date</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%COMBOTEXT(task_set_date)%%></div>
			</div>
		</div>
		<!-- Field: Supervisor name -->
		<div class="form-group task_allocation_table-supervisor_name" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Supervisor name</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="supervisor_name<%%RND1%%>"><%%COMBOTEXT(supervisor_name)%%></span></div>
			</div>
		</div>
		<!-- Field: Assigned to -->
		<div class="form-group task_allocation_table-assigned_to" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Assigned to</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="assigned_to<%%RND1%%>"><%%COMBOTEXT(assigned_to)%%></span></div>
			</div>
		</div>
		<!-- Field: Created By Username -->
		<div class="form-group task_allocation_table-created_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Created By Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(created_by_username)%%></div>
			</div>
		</div>
		<!-- Field: Last Updated by Username -->
		<div class="form-group task_allocation_table-last_updated_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Last Updated by Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(last_updated_by_username)%%></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
<!-- child records -->
<div class="panel-body">
	<div id="task_allocation_table-children"></div>
</div>

<script>
	$j(function() {
		/* prevent loading child records in multiple DVP */
		if($j('[id=task_allocation_table-children]').length > 1) return;

		post(
			'parent-children.php', {
				ParentTable: 'task_allocation_table',
				SelectedID: '<%%VALUE(task_id)%%>',
				Operation: 'show-children-printable'
			},
			'task_allocation_table-children',
			'disable-element',
			'loading-element',
			apply_persisting_children
		);

		$j('form').on('click', '#children-tabs button[data-target]', function() {
			$j(this).toggleClass('active');
			persist_expanded_child($j(this).attr('id'));
		});
	})
</script>
