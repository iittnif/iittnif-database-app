<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: Project ID::Title -->
		<div class="form-group first_level_shortlisted_proposals_tdp-project_id" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Project ID::Title</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="project_id<%%RND1%%>"><%%COMBOTEXT(project_id)%%></span></div>
			</div>
		</div>
		<!-- Field: Name -->
		<div class="form-group first_level_shortlisted_proposals_tdp-name" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Name</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(name)%%></div>
			</div>
		</div>
		<!-- Field: Institution -->
		<div class="form-group first_level_shortlisted_proposals_tdp-institution" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Institution</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(institution)%%></div>
			</div>
		</div>
		<!-- Field: Domain of interest -->
		<div class="form-group first_level_shortlisted_proposals_tdp-domain_of_interest" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Domain of interest</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(domain_of_interest)%%></div>
			</div>
		</div>
		<!-- Field: Proposal link -->
		<div class="form-group first_level_shortlisted_proposals_tdp-proposal_link" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Proposal link</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(proposal_link)%%></div>
			</div>
		</div>
		<!-- Field: First level comment -->
		<div class="form-group first_level_shortlisted_proposals_tdp-first_level_comment" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">First level comment</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(first_level_comment)%%></div>
			</div>
		</div>
		<!-- Field: Created By Username -->
		<div class="form-group first_level_shortlisted_proposals_tdp-created_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Created By Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(created_by_username)%%></div>
			</div>
		</div>
		<!-- Field: Last Updated by Username -->
		<div class="form-group first_level_shortlisted_proposals_tdp-last_updated_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Last Updated by Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(last_updated_by_username)%%></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
