<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: Project ID::Title -->
		<div class="form-group address_tdp-project_id" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Project ID::Title</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="project_id<%%RND1%%>"><%%COMBOTEXT(project_id)%%></span></div>
			</div>
		</div>
		<!-- Field: Project title -->
		<div class="form-group address_tdp-project_title" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Project title</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(project_title)%%></div>
			</div>
		</div>
		<!-- Field: Short name -->
		<div class="form-group address_tdp-short_name" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Short name</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(short_name)%%></div>
			</div>
		</div>
		<!-- Field: Pincode -->
		<div class="form-group address_tdp-pincode" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Pincode</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(pincode)%%></div>
			</div>
		</div>
		<!-- Field: Lattitude -->
		<div class="form-group address_tdp-lattitude" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Lattitude</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(lattitude)%%></div>
			</div>
		</div>
		<!-- Field: Longitude -->
		<div class="form-group address_tdp-longitude" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Longitude</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(longitude)%%></div>
			</div>
		</div>
		<!-- Field: Created By Username -->
		<div class="form-group address_tdp-created_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Created By Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(created_by_username)%%></div>
			</div>
		</div>
		<!-- Field: Last Updated by Username -->
		<div class="form-group address_tdp-last_updated_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Last Updated by Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(last_updated_by_username)%%></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
