<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: PC ID -->
		<div class="form-group computer_user_details-pc_id" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">PC ID</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="pc_id<%%RND1%%>"><%%COMBOTEXT(pc_id)%%></span></div>
			</div>
		</div>
		<!-- Field: Entry time -->
		<div class="form-group computer_user_details-entry_time" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Entry time</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(entry_time)%%></div>
			</div>
		</div>
		<!-- Field: Exit time -->
		<div class="form-group computer_user_details-exit_time" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Exit time</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(exit_time)%%></div>
			</div>
		</div>
		<!-- Field: Date -->
		<div class="form-group computer_user_details-date" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Date</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%COMBOTEXT(date)%%></div>
			</div>
		</div>
		<!-- Field: Created By Username -->
		<div class="form-group computer_user_details-created_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Created By Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(created_by_username)%%></div>
			</div>
		</div>
		<!-- Field: Last Updated by Username -->
		<div class="form-group computer_user_details-last_updated_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Last Updated by Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(last_updated_by_username)%%></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
