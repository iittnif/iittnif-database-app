<!-- Edit this file to change the layout of the detail view print preview page -->


<div class="panel-heading"><h3 class="panel-title">
	<strong><%%DETAIL_VIEW_TITLE%%></strong>
	<div class="hidden-print pull-right">
		<div class="btn-group">
			<button type="button" id="print" onclick="window.print();" title="<%%TRANSLATION(Print)%%>" class="btn btn-primary"><i class="glyphicon glyphicon-print"></i> <%%TRANSLATION(Print)%%></button>
			<button type="submit" id="back" title="<%%TRANSLATION(Cancel Printing)%%>" class="btn btn-default"><i class="glyphicon glyphicon-remove-circle"></i> <%%TRANSLATION(Cancel Printing)%%></button>
		</div>
	</div>
	<div class="clearfix"></div>
</h3></div>

<div class="panel-body">
	<fieldset class="form-horizontal">
		<!-- Field: Select Car -->
		<div class="form-group car_usage_table-car_lookup" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Select Car</label>
			<div class="col-xs-9">
				<div class="form-control-static"><span id="car_lookup<%%RND1%%>"><%%COMBOTEXT(car_lookup)%%></span></div>
			</div>
		</div>
		<!-- Field: Used by -->
		<div class="form-group car_usage_table-used_by" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Used by</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(used_by)%%></div>
			</div>
		</div>
		<!-- Field: Date and time from -->
		<div class="form-group car_usage_table-datetime_from" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Date and time from</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(datetime_from)%%></div>
			</div>
		</div>
		<!-- Field: Date and time to -->
		<div class="form-group car_usage_table-datetime_to" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Date and time to</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(datetime_to)%%></div>
			</div>
		</div>
		<!-- Field: Total distance run (In KM) -->
		<div class="form-group car_usage_table-total_distance_run" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Total distance run (In KM)</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(total_distance_run)%%></div>
			</div>
		</div>
		<!-- Field: Purpose -->
		<div class="form-group car_usage_table-purpose" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Purpose</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(purpose)%%></div>
			</div>
		</div>
		<!-- Field: Created By Username -->
		<div class="form-group car_usage_table-created_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Created By Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(created_by_username)%%></div>
			</div>
		</div>
		<!-- Field: Last Updated by Username -->
		<div class="form-group car_usage_table-last_updated_by_username" style="border-bottom: dotted 1px #DDD;">
			<label class="col-xs-3 control-label">Last Updated by Username</label>
			<div class="col-xs-9">
				<div class="form-control-static"><%%VALUE(last_updated_by_username)%%></div>
			</div>
		</div>
	</fieldset>
</div>
<script>
	$j(function() {
		// render read-only checkboxes in DVP
		$j('form input[type=checkbox]:not(.hidden):checked')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-check"></i>');
		$j('form input[type=checkbox]:not(.hidden):not(:checked)')
			.addClass('hidden')
			.after('<i class="glyphicon glyphicon-unchecked"></i>')
	})
</script>
